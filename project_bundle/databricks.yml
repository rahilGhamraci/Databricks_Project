# This is a Databricks asset bundle definition for project_bundle.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: project_bundle
  uuid: e7bcdc78-d100-42e8-abe1-6ec80aaa76b2

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use
  spn_id:
    description: spn id


    
targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-8dc07c13-610a.cloud.databricks.com
    variables:
      catalog: dev
      schema: dev
      spn_id: 2acf51c4-5c05-46f4-8e05-24b48a73d4ac
    presets:
      artifacts_dynamic_version: true
  prod:
    mode: production
    workspace:
      host: https://dbc-8dc07c13-610a.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/ghamracirahil@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Prod_Databricks_Project
    variables:
      catalog: dev
      schema: prod
      spn_id: 2acf51c4-5c05-46f4-8e05-24b48a73d4ac
    permissions:
      - user_name: ghamracirahil@gmail.com
        level: CAN_MANAGE
      - group_name: earthquake_prod_writer
        level: CAN_MANAGE
